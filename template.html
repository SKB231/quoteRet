<html>
  <head>
    <title>quoteRet</title>
     <script
      src="https://unpkg.com/htmx.org@1.9.6"
      integrity="sha384-FhXw7b6AlE/jyjlZH5iHa/tTe9EpJ1Y55RjcgPbjeWMskSxZt1v9qkxLJWNJaGni"
      crossorigin="anonymous"
    ></script>
<style>
        /* Paste your CSS code here */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            color: #333;
        }

        .streamer {
            background-color: white;
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .dataStreamerField {
            background-color: #e9ecef;
            padding: 10px;
            margin-top: 20px;
            border-radius: 4px;
            font-family: monospace;
            white-space: pre-line;
        }

        h1, h3 {
            text-align: center;
        }
    </style>
    <link rel="stylesheet" href="style.css"/>
  <body>
    <h1>Quote Retriver</h1>
      <div class="streamer">
 <label for="quotePriceInput">Quote Price</label>
    <input type="text" hx-get="/quotePrice" name="quote" hx-trigger="keyup delay:500ms change" hx-target="#search-result">
    </input>
      <div id="search-result" class="dataStreamerField">
          Search Quotes for results to come up
        </div>

      </div>
    <h3>Simple Quote Retrival</h3>
     </body>
</html>
